server {
    listen 443 ssl;
    listen 2053 ssl;
    listen 2083 ssl;
    listen 2087 ssl;
    listen 2096 ssl;
    listen 8443 ssl;
    http2 on;
    server_name dquery.js.gripe;

    ssl_certificate     /etc/openresty/ssl/js.gripe.fullchain.pem;
    ssl_certificate_key /etc/openresty/ssl/js.gripe.key.pem;

    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    charset utf-8;
    server_tokens off;

    root /var/www/dqueryd/current;
    index index.html;
    error_page 404 /404.html;

    location = /dns-query {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $dquery_site_client_ip;
        proxy_set_header CF-Connecting-IP $dquery_site_client_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header X-ECS $http_x_ecs;
        proxy_pass http://dquery_site_backend;
        proxy_buffering on;
        set_by_lua_block $dquery_doh_cache_key {
            local dns = ngx.var.arg_dns or ""
            local b64 = dns:gsub("-", "+"):gsub("_", "/")
            local rem = #b64 % 4
            if rem == 2 then
                b64 = b64 .. "=="
            elseif rem == 3 then
                b64 = b64 .. "="
            elseif rem == 1 then
                b64 = ""
            end
            local raw = b64 ~= "" and ngx.decode_base64(b64) or nil
            if raw and #raw >= 2 then
                raw = string.char(0, 0) .. raw:sub(3)
                dns = ngx.encode_base64(raw):gsub("+", "-"):gsub("/", "_"):gsub("=+$", "")
            end
            return (ngx.var.scheme or "") .. "|" .. (ngx.var.host or "") .. "|" .. (ngx.var.uri or "") .. "|dns=" .. dns .. "|accept=" .. (ngx.var.http_accept or "") .. "|ecs=" .. (ngx.var.http_x_ecs or "")
        }
        proxy_cache off;
        proxy_cache_methods GET HEAD;
        proxy_cache_key $dquery_doh_cache_key;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;
        proxy_request_buffering on;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location ~ "^/dns-query/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $dquery_site_client_ip;
        proxy_set_header CF-Connecting-IP $dquery_site_client_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header X-ECS $http_x_ecs;
        proxy_pass http://dquery_site_backend;
        proxy_buffering on;
        set_by_lua_block $dquery_doh_cache_key {
            local dns = ngx.var.arg_dns or ""
            local b64 = dns:gsub("-", "+"):gsub("_", "/")
            local rem = #b64 % 4
            if rem == 2 then
                b64 = b64 .. "=="
            elseif rem == 3 then
                b64 = b64 .. "="
            elseif rem == 1 then
                b64 = ""
            end
            local raw = b64 ~= "" and ngx.decode_base64(b64) or nil
            if raw and #raw >= 2 then
                raw = string.char(0, 0) .. raw:sub(3)
                dns = ngx.encode_base64(raw):gsub("+", "-"):gsub("/", "_"):gsub("=+$", "")
            end
            return (ngx.var.scheme or "") .. "|" .. (ngx.var.host or "") .. "|" .. (ngx.var.uri or "") .. "|dns=" .. dns .. "|accept=" .. (ngx.var.http_accept or "") .. "|ecs=" .. (ngx.var.http_x_ecs or "")
        }
        proxy_cache off;
        proxy_cache_methods GET HEAD;
        proxy_cache_key $dquery_doh_cache_key;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_bypass $http_authorization;
        proxy_no_cache $http_authorization;
        proxy_request_buffering on;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location ^~ /api/v1/dquery/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $dquery_site_client_ip;
        proxy_set_header CF-Connecting-IP $dquery_site_client_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_pass http://dquery_site_backend;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_read_timeout 20s;
        proxy_send_timeout 20s;
    }

    location = /login {
        return 301 /login/;
    }

    location = /console {
        return 301 /console/;
    }

    location ^~ /auth/account/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $dquery_site_client_ip;
        proxy_set_header CF-Connecting-IP $dquery_site_client_ip;
        proxy_pass http://dquery_site_backend;
        proxy_buffering off;
        access_log off;
    }

    location ^~ /_astro/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /media/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /favicon.svg {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    listen 2053 ssl;
    listen 2083 ssl;
    listen 2087 ssl;
    listen 2096 ssl;
    listen 8443 ssl;
    http2 on;
    server_name dns.js.gripe;

    ssl_certificate     /etc/openresty/ssl/js.gripe.fullchain.pem;
    ssl_certificate_key /etc/openresty/ssl/js.gripe.key.pem;

    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://dquery.js.gripe$request_uri;
}

server {
    listen 80;
    server_name dquery.js.gripe dns.js.gripe;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://dquery.js.gripe$request_uri;
    }
}
