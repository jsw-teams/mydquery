# Put this file under:
# /usr/local/openresty/nginx/conf/conf.d/zz_dqueryd_support.conf
# It is expected to be included from the global http {} context.

map $http_cf_connecting_ip $dquery_site_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

proxy_cache_path /usr/local/openresty/nginx/cache/dquery_doh
                 levels=1:2
                 keys_zone=dquery_doh:20m
                 max_size=512m
                 inactive=30m
                 use_temp_path=off;

upstream dquery_site_backend {
    server 127.0.0.1:18053;
    keepalive 32;
}
