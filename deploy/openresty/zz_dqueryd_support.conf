# Put this file under:
# /usr/local/openresty/nginx/conf/conf.d/zz_dqueryd_support.conf
# It is expected to be included from the global http {} context.

map $http_cf_connecting_ip $dquery_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

upstream dqueryd_backend {
    zone dqueryd_backend 64k;
    server 127.0.0.1:18053 max_fails=3 fail_timeout=5s;
    keepalive 128;
    keepalive_requests 10000;
    keepalive_timeout 60s;
}
