# Include this file inside the existing gateway.js.gripe server {} block:
# include /usr/local/openresty/nginx/conf/conf.d/gateway.js.gripe.dquery.locations.conf;

location = /api/v1/dquery {
    return 308 https://dquery.js.gripe/dns-query$is_args$args;
}

location ^~ /api/v1/dquery/ {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Expose-Headers "Cache-Control, X-DQuery-Route, X-DQuery-Upstream, X-DQuery-Selected-ECS, X-DQuery-ECS-Source, X-DQuery-Cache" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $dquery_client_ip;
    proxy_set_header CF-Connecting-IP $dquery_client_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Vary;
    proxy_pass http://dqueryd_backend;
    proxy_buffering off;
    proxy_request_buffering on;
    proxy_read_timeout 20s;
    proxy_send_timeout 20s;
}

location = /dns-query {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $dquery_client_ip;
    proxy_set_header CF-Connecting-IP $dquery_client_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header X-ECS $http_x_ecs;
    proxy_pass http://dqueryd_backend;
    proxy_buffering on;
    set_by_lua_block $dquery_doh_cache_key {
        local dns = ngx.var.arg_dns or ""
        local b64 = dns:gsub("-", "+"):gsub("_", "/")
        local rem = #b64 % 4
        if rem == 2 then
            b64 = b64 .. "=="
        elseif rem == 3 then
            b64 = b64 .. "="
        elseif rem == 1 then
            b64 = ""
        end
        local raw = b64 ~= "" and ngx.decode_base64(b64) or nil
        if raw and #raw >= 2 then
            raw = string.char(0, 0) .. raw:sub(3)
            dns = ngx.encode_base64(raw):gsub("+", "-"):gsub("/", "_"):gsub("=+$", "")
        end
        return (ngx.var.scheme or "") .. "|" .. (ngx.var.host or "") .. "|" .. (ngx.var.uri or "") .. "|dns=" .. dns .. "|accept=" .. (ngx.var.http_accept or "") .. "|ecs=" .. (ngx.var.http_x_ecs or "")
    }
    proxy_cache dquery_doh;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $dquery_doh_cache_key;
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_bypass $http_authorization;
    proxy_no_cache $http_authorization;
    add_header X-DQuery-Proxy-Cache $upstream_cache_status always;
    proxy_request_buffering on;
    proxy_read_timeout 20s;
    proxy_send_timeout 20s;
}

location ~ "^/dns-query/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$" {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://dquery.js.gripe" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, Authorization, X-ECS" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $dquery_client_ip;
    proxy_set_header CF-Connecting-IP $dquery_client_ip;
    proxy_set_header CF-IPCountry $http_cf_ipcountry;
    proxy_set_header X-ECS $http_x_ecs;
    proxy_pass http://dqueryd_backend;
    proxy_buffering on;
    set_by_lua_block $dquery_doh_cache_key {
        local dns = ngx.var.arg_dns or ""
        local b64 = dns:gsub("-", "+"):gsub("_", "/")
        local rem = #b64 % 4
        if rem == 2 then
            b64 = b64 .. "=="
        elseif rem == 3 then
            b64 = b64 .. "="
        elseif rem == 1 then
            b64 = ""
        end
        local raw = b64 ~= "" and ngx.decode_base64(b64) or nil
        if raw and #raw >= 2 then
            raw = string.char(0, 0) .. raw:sub(3)
            dns = ngx.encode_base64(raw):gsub("+", "-"):gsub("/", "_"):gsub("=+$", "")
        end
        return (ngx.var.scheme or "") .. "|" .. (ngx.var.host or "") .. "|" .. (ngx.var.uri or "") .. "|dns=" .. dns .. "|accept=" .. (ngx.var.http_accept or "") .. "|ecs=" .. (ngx.var.http_x_ecs or "")
    }
    proxy_cache dquery_doh;
    proxy_cache_methods GET HEAD;
    proxy_cache_key $dquery_doh_cache_key;
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_bypass $http_authorization;
    proxy_no_cache $http_authorization;
    add_header X-DQuery-Proxy-Cache $upstream_cache_status always;
    proxy_request_buffering on;
    proxy_read_timeout 20s;
    proxy_send_timeout 20s;
}
