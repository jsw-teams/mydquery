server {
    listen 443 ssl;
    listen 2053 ssl;
    listen 2083 ssl;
    listen 2087 ssl;
    listen 2096 ssl;
    listen 8443 ssl;
    http2 on;
    server_name dns.js.gripe;

    ssl_certificate     /etc/openresty/ssl/js.gripe.fullchain.pem;
    ssl_certificate_key /etc/openresty/ssl/js.gripe.key.pem;

    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    charset utf-8;
    server_tokens off;

    root /var/www/dqueryd/current;
    index index.html;
    error_page 404 /404.html;

    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 204;
    }

    location = /login {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        return 301 /login/;
    }

    location = /console {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        return 301 /console/;
    }

    location ^~ /auth/account/ {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $dquery_client_ip;
        proxy_set_header CF-Connecting-IP $dquery_client_ip;
        proxy_pass http://dqueryd_backend;
        proxy_buffering on;
        proxy_connect_timeout 1s;
        proxy_read_timeout 6s;
        proxy_send_timeout 6s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
        access_log off;
    }

    location ^~ /_astro/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /media/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /favicon.png {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        if ($openstry_probe_request) {
            return 204;
        }
        if ($openstry_head_probe) {
            return 204;
        }
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name dns.js.gripe;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
